<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Trip Tales</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <a class="logo" href="index.html">&#9992; Trip Tales</a>

    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html#home" onclick="closeMenu()">Home</a></li>
      <li><a href="index.html#destinations" onclick="closeMenu()">Destinations</a></li>
      <li><a href="index.html#stories" onclick="closeMenu()">Stories</a></li>
      <li><a href="index.html#voice" onclick="closeMenu()">Voice Entries</a></li>
    </ul>
  </nav>

  <!-- Reset Password Container -->
  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">&#9992; Trip Tales</div>
      <p class="auth-tagline">Choose a new password</p>

      <form class="auth-form" id="resetForm" onsubmit="handleResetPassword(event)">
        <div class="form-group">
          <label>New Password</label>
          <div class="password-wrap">
            <input type="password" id="resetPassword" placeholder="Create a new password" required />
            <span class="toggle-pw" onclick="togglePassword('resetPassword', this)">👁️</span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="password-wrap">
            <input type="password" id="resetConfirm" placeholder="Repeat your new password" required />
            <span class="toggle-pw" onclick="togglePassword('resetConfirm', this)">👁️</span>
          </div>
        </div>
        <button type="submit" class="auth-btn">Reset Password</button>
        <p class="auth-msg" id="resetMsg"></p>
        <p class="switch-text"><a href="auth.html">Back to Login</a></p>
      </form>

    </div>
  </div>

  <script src="config.js"></script>
  <script src="reset-password.js"></script>
</body>
</html>
