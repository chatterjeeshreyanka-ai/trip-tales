services:
  - type: web
    name: trip-tales
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://trip-tales.shop
      - key: DATA_DIR
        value: /data
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "Trip Tales <onboarding@resend.dev>"
      - key: ADMIN_EMAILS
        value: chatterjeeshreyanka@gmail.com,chatterjeeshreyanka+admin@gmail.com
    disk:
      name: trip-tales-data
      mountPath: /data
      sizeGB: 1
