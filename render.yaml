services:
  - type: web
    name: trip-tales
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://creative-palmier-f29a9c.netlify.app
      - key: DATA_DIR
        value: /data
    disk:
      name: trip-tales-data
      mountPath: /data
      sizeGB: 1
